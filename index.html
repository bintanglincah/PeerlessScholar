<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peerless Scholar — Rise of Kingdoms</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold:        #c9a84c;
      --gold-light:  #f0d080;
      --gold-dim:    #7a5f28;
      --bg-deep:     #0a0806;
      --bg-mid:      #110e08;
      --bg-card:     #1f1a0d;
      --border:      #3a2e14;
      --border-glow: rgba(201,168,76,.25);
      --text:        #e8d9b8;
      --text-dim:    #8a7a58;
      --green:       #4caa6e;
      --blue:        #4c7ec9;
      --red:         #c94c6e;
      --orange:      #c9874c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 40% at 50% 0%, rgba(201,168,76,.07) 0%, transparent 70%),
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(201,168,76,.015) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(201,168,76,.015) 40px);
      pointer-events: none;
    }

    /* ── Header ── */
    header {
      position: relative; z-index: 10;
      text-align: center;
      padding: 44px 20px 28px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(201,168,76,.09) 0%, transparent 100%);
    }

    .crown {
      font-size: 2.4rem;
      margin-bottom: 6px;
      filter: drop-shadow(0 0 14px rgba(201,168,76,.65));
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-5px); }
    }

    h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.5rem, 4vw, 2.7rem);
      color: var(--gold-light);
      text-shadow: 0 0 30px rgba(201,168,76,.5), 0 2px 4px rgba(0,0,0,.8);
      letter-spacing: .04em;
      line-height: 1.2;
    }

    .subtitle {
      font-family: 'Cinzel', serif;
      font-size: .82rem;
      color: var(--gold-dim);
      letter-spacing: .15em;
      text-transform: uppercase;
      margin-top: 7px;
    }

    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .stat { text-align: center; }
    .stat-num   { font-family: 'Cinzel', serif; font-size: 1.5rem; color: var(--gold); font-weight: 700; }
    .stat-label { font-size: .7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: .1em; }

    /* ── Main ── */
    main {
      position: relative; z-index: 10;
      max-width: 920px;
      margin: 0 auto;
      padding: 28px 18px 80px;
    }

    /* ── Search box ── */
    .search-wrap { position: relative; margin-bottom: 16px; }

    .s-icon {
      position: absolute; left: 17px; top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem; color: var(--gold-dim);
      pointer-events: none; transition: color .2s;
    }

    #searchInput {
      width: 100%;
      padding: 15px 50px 15px 50px;
      font-family: 'Crimson Pro', serif;
      font-size: 1.15rem;
      color: var(--text);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      outline: none;
      transition: border-color .25s, box-shadow .25s;
      caret-color: var(--gold);
    }

    #searchInput::placeholder { color: var(--text-dim); }

    #searchInput:focus {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 3px var(--border-glow), 0 4px 20px rgba(0,0,0,.6);
    }

    .search-wrap:focus-within .s-icon { color: var(--gold); }

    #clearBtn {
      position: absolute; right: 15px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--text-dim); font-size: 1rem;
      cursor: pointer; padding: 4px;
      transition: color .2s; display: none;
    }
    #clearBtn:hover { color: var(--gold); }

    /* ── Filter buttons ── */
    .filter-row { display: flex; gap: 7px; margin-bottom: 20px; flex-wrap: wrap; }

    .filter-btn {
      padding: 7px 15px;
      font-family: 'Cinzel', serif;
      font-size: .68rem; letter-spacing: .08em; text-transform: uppercase;
      border-radius: 3px; border: 1px solid var(--border);
      background: var(--bg-card); color: var(--text-dim);
      cursor: pointer; transition: all .2s;
    }
    .filter-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
    .filter-btn.active { background: rgba(201,168,76,.14); border-color: var(--gold); color: var(--gold-light); }
    .filter-btn[data-cat="game"].active    { border-color: var(--blue);   color: #7ab2f5; background: rgba(76,126,201,.1); }
    .filter-btn[data-cat="history"].active { border-color: var(--gold);   color: var(--gold); }
    .filter-btn[data-cat="science"].active { border-color: var(--green);  color: #7ed4a4; background: rgba(76,170,110,.1); }
    .filter-btn[data-cat="culture"].active { border-color: var(--red);    color: #f0819a; background: rgba(201,76,110,.1); }
    .filter-btn[data-cat="sports"].active  { border-color: var(--orange); color: #f0a97a; background: rgba(201,135,76,.1); }

    /* ── Results info ── */
    #resultsInfo {
      font-family: 'Cinzel', serif;
      font-size: .76rem; color: var(--text-dim);
      letter-spacing: .06em; margin-bottom: 14px; min-height: 18px;
    }
    #resultsInfo span { color: var(--gold); }

    /* ── Cards ── */
    #resultsList { display: flex; flex-direction: column; gap: 9px; }

    .qa-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px 20px;
      transition: border-color .2s, transform .15s, box-shadow .2s;
      animation: fadeIn .22s ease;
      position: relative; overflow: hidden;
    }

    .qa-card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      opacity: 0; transition: opacity .2s;
    }

    .qa-card[data-cat="game"]::before    { background: var(--blue); }
    .qa-card[data-cat="history"]::before { background: var(--gold); }
    .qa-card[data-cat="science"]::before { background: var(--green); }
    .qa-card[data-cat="culture"]::before { background: var(--red); }
    .qa-card[data-cat="sports"]::before  { background: var(--orange); }

    .qa-card:hover {
      border-color: var(--gold-dim);
      transform: translateX(3px);
      box-shadow: -3px 0 18px rgba(201,168,76,.08);
    }
    .qa-card:hover::before { opacity: 1; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(7px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-top {
      display: flex; align-items: flex-start; gap: 10px; margin-bottom: 9px;
    }

    .card-num {
      font-family: 'Cinzel', serif; font-size: .63rem;
      color: var(--text-dim); min-width: 30px;
      padding-top: 2px; flex-shrink: 0;
    }

    .card-question {
      font-size: 1.03rem; color: var(--text); line-height: 1.55; flex: 1;
    }

    .card-question mark {
      background: rgba(201,168,76,.22);
      color: var(--gold-light); border-radius: 2px; padding: 0 2px;
    }

    .card-bottom {
      display: flex; align-items: center; gap: 9px; margin-left: 40px;
    }

    .ans-icon {
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(76,170,110,.12);
      border: 1px solid rgba(76,170,110,.38);
      display: flex; align-items: center; justify-content: center;
      font-size: .62rem; color: var(--green); flex-shrink: 0;
    }

    .card-answer {
      font-size: .98rem; color: var(--green); font-style: italic; font-weight: 600;
    }

    .card-answer mark {
      background: rgba(76,170,110,.18);
      color: var(--green); border-radius: 2px;
      padding: 0 2px; font-style: italic;
    }

    .tag {
      display: inline-block;
      font-family: 'Cinzel', serif; font-size: .58rem;
      letter-spacing: .07em; text-transform: uppercase;
      padding: 2px 7px; border-radius: 2px;
      margin-left: auto; align-self: flex-start; flex-shrink: 0;
    }
    .tag-game    { background: rgba(76,126,201,.12); color: #7ab2f5; border: 1px solid rgba(76,126,201,.28); }
    .tag-history { background: rgba(201,168,76,.10); color: var(--gold); border: 1px solid var(--border); }
    .tag-science { background: rgba(76,170,110,.10); color: #7ed4a4; border: 1px solid rgba(76,170,110,.28); }
    .tag-culture { background: rgba(201,76,110,.10); color: #f0819a; border: 1px solid rgba(201,76,110,.28); }
    .tag-sports  { background: rgba(201,135,76,.10); color: #f0a97a; border: 1px solid rgba(201,135,76,.28); }

    /* ── Empty / loading state ── */
    .state-box {
      text-align: center; padding: 56px 20px;
      color: var(--text-dim); animation: fadeIn .3s ease;
    }
    .state-icon  { font-size: 3rem; margin-bottom: 14px; opacity: .4; }
    .state-title { font-family: 'Cinzel', serif; font-size: 1.05rem; margin-bottom: 7px; }
    .state-sub   { font-size: .9rem; }

    /* ── Load more ── */
    #loadMoreBtn {
      display: none; width: 100%; margin-top: 18px; padding: 13px;
      font-family: 'Cinzel', serif; font-size: .78rem;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--gold-dim); background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 4px;
      cursor: pointer; transition: all .2s;
    }
    #loadMoreBtn:hover { border-color: var(--gold); color: var(--gold); }

    /* ── Footer ── */
    footer {
      position: relative; z-index: 10;
      text-align: center; padding: 20px;
      border-top: 1px solid var(--border);
      font-size: .76rem; color: var(--text-dim);
    }
    footer a { color: var(--gold-dim); text-decoration: none; }
    footer a:hover { color: var(--gold); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-mid); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }

    @media (max-width: 600px) {
      .card-bottom { margin-left: 0; }
      .stats-bar   { gap: 14px; }
    }
  </style>
</head>
<body>

<header>
  <div class="crown">👑</div>
  <h1>Peerless Scholar</h1>
  <p class="subtitle">⚔ Rise of Kingdoms · Lyceum of Wisdom · Made By Bintodd ⚔</p>
  <div class="stats-bar">
    <div class="stat"><div class="stat-num" id="statTotal">—</div><div class="stat-label">Total Q&amp;A</div></div>
    <div class="stat"><div class="stat-num" id="statGame">—</div><div class="stat-label">🎮 Game</div></div>
    <div class="stat"><div class="stat-num" id="statHistory">—</div><div class="stat-label">📜 History</div></div>
    <div class="stat"><div class="stat-num" id="statScience">—</div><div class="stat-label">🔬 Science</div></div>
    <div class="stat"><div class="stat-num" id="statCulture">—</div><div class="stat-label">🎨 Culture</div></div>
    <div class="stat"><div class="stat-num" id="statSports">—</div><div class="stat-label">⚽ Sports</div></div>
  </div>
</header>

<main>
  <div class="search-wrap">
    <span class="s-icon">🔍</span>
    <input
      type="text"
      id="searchInput"
      placeholder="Type keywords from your question... e.g. 'England', 'Hannibal', 'unit strong against'"
      autocomplete="off"
      spellcheck="false"
    />
    <button id="clearBtn" title="Clear">✕</button>
  </div>

  <div class="filter-row">
    <button class="filter-btn active" data-cat="all">All</button>
    <button class="filter-btn" data-cat="game">🎮 Game</button>
    <button class="filter-btn" data-cat="history">📜 History</button>
    <button class="filter-btn" data-cat="science">🔬 Science</button>
    <button class="filter-btn" data-cat="culture">🎨 Culture</button>
    <button class="filter-btn" data-cat="sports">⚽ Sports</button>
  </div>

  <div id="resultsInfo"></div>
  <div id="resultsList"></div>
  <button id="loadMoreBtn">⬇ Load More Results</button>
</main>

<footer>
  Data compiled from
  <a href="https://riseofkingdomsguides.com" target="_blank">riseofkingdomsguides.com</a> ·
  <a href="https://www.mejoress.com/rok-peerless-scholar-answers/" target="_blank">mejoress.com</a> ·
  <a href="https://rok.icha.my" target="_blank">rok.icha.my</a> ·
  <a href="https://gamerempire.net/rise-of-kingdoms-all-peerless-scholar-questions-answers/" target="_blank">gamerempire.net</a> ·
  <a href="https://riseofkingdoms.fandom.com" target="_blank">RoK Fandom Wiki</a>
</footer>

<script>
// ─────────────────────────────────────────────────────────────
//  CONFIG — ubah path ini jika questions.json dipindahkan
// ─────────────────────────────────────────────────────────────
const DB_URL = 'questions.json';

// ─────────────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────────────
const PAGE_SIZE = 30;
let DB          = [];       // seluruh data dari questions.json
let activeFilter = 'all';   // kategori yang sedang aktif
let currentResults = [];    // hasil pencarian saat ini
let displayedCount = 0;     // berapa kartu yang sudah dirender
let searchTimer   = null;

// ─────────────────────────────────────────────────────────────
//  LOAD DATA
// ─────────────────────────────────────────────────────────────
async function loadDB() {
  try {
    const res = await fetch(DB_URL);
    if (!res.ok) throw new Error('Failed to fetch questions.json');
    DB = await res.json();
    updateStats();
    renderResults(); // tampilkan semua setelah data siap
  } catch (err) {
    document.getElementById('resultsList').innerHTML = `
      <div class="state-box">
        <div class="state-icon">⚠️</div>
        <div class="state-title">Gagal memuat database</div>
        <div class="state-sub">
          Pastikan file <code>questions.json</code> berada di folder yang sama dengan <code>index.html</code>.<br/>
          Jika membuka langsung via browser (file://), gunakan ekstensi <b>Live Server</b> di VS Code.
        </div>
      </div>`;
  }
}

// ─────────────────────────────────────────────────────────────
//  STATS
// ─────────────────────────────────────────────────────────────
function updateStats() {
  const count = cat => DB.filter(x => x.category === cat).length;
  document.getElementById('statTotal').textContent   = DB.length;
  document.getElementById('statGame').textContent    = count('game');
  document.getElementById('statHistory').textContent = count('history');
  document.getElementById('statScience').textContent = count('science');
  document.getElementById('statCulture').textContent = count('culture');
  document.getElementById('statSports').textContent  = count('sports');
}

// ─────────────────────────────────────────────────────────────
//  SEARCH — strict: semua kata dalam query HARUS ada di soal/jawaban
// ─────────────────────────────────────────────────────────────
function getWords(text) {
  return text.toLowerCase()
    .replace(/[^a-z0-9 ]/g, ' ')
    .split(/\s+/)
    .filter(w => w.length > 0);
}

function matchItem(item, words, rawQuery) {
  const combined = (item.question + ' ' + item.answer).toLowerCase();

  // Semua kata HARUS ada — jika satu saja tidak ada, langsung skip
  for (const w of words) {
    if (!combined.includes(w)) return 0;
  }

  let score = words.length * 10;

  // Bonus: frasa lengkap cocok persis
  if (combined.includes(rawQuery.toLowerCase())) score += 50;

  // Bonus: cocok di pertanyaan (bukan hanya jawaban)
  if (item.question.toLowerCase().includes(rawQuery.toLowerCase())) score += 20;

  // Bonus: kata lebih panjang = lebih spesifik
  for (const w of words) score += w.length;

  return score;
}

// ─────────────────────────────────────────────────────────────
//  HIGHLIGHT — tandai kata yang cocok dengan <mark>
// ─────────────────────────────────────────────────────────────
function escHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function highlight(text, words, rawQuery) {
  let result = escHtml(text);

  // Highlight frasa penuh terlebih dahulu
  const escapedRaw = escHtml(rawQuery).replace(/[-[\]{}()*+?.,\\^$|#\s]/g, '\\$&');
  if (escapedRaw.length > 1) {
    result = result.replace(new RegExp(`(${escapedRaw})`, 'gi'), '<mark>$1</mark>');
  }

  // Lalu highlight kata per kata
  for (const w of words) {
    if (w.length < 2) continue;
    const ew = w.replace(/[-[\]{}()*+?.,\\^$|#\s]/g, '\\$&');
    result = result.replace(
      new RegExp(`(?<!<[^>]*)(${ew})(?![^<]*>)`, 'gi'),
      '<mark>$1</mark>'
    );
  }
  return result;
}

// ─────────────────────────────────────────────────────────────
//  RENDER CARD
// ─────────────────────────────────────────────────────────────
const TAG_HTML = {
  game:    '<span class="tag tag-game">Game</span>',
  history: '<span class="tag tag-history">History</span>',
  science: '<span class="tag tag-science">Science</span>',
  culture: '<span class="tag tag-culture">Culture</span>',
  sports:  '<span class="tag tag-sports">Sports</span>',
};

function renderCard(item, words, rawQuery, index) {
  const qHtml = rawQuery
    ? highlight(item.question, words, rawQuery)
    : escHtml(item.question);
  const aHtml = rawQuery
    ? highlight(item.answer, words, rawQuery)
    : escHtml(item.answer);

  return `
    <div class="qa-card" data-cat="${item.category}" style="animation-delay:${Math.min(index * 0.03, 0.28)}s">
      <div class="card-top">
        <span class="card-num">#${index + 1}</span>
        <span class="card-question">${qHtml}</span>
        ${TAG_HTML[item.category] || ''}
      </div>
      <div class="card-bottom">
        <span class="ans-icon">✓</span>
        <span class="card-answer">${aHtml}</span>
      </div>
    </div>`;
}

// ─────────────────────────────────────────────────────────────
//  RENDER RESULTS
// ─────────────────────────────────────────────────────────────
function renderResults() {
  const rawQuery = document.getElementById('searchInput').value.trim();
  const words    = getWords(rawQuery);
  const list     = document.getElementById('resultsList');
  const info     = document.getElementById('resultsInfo');
  const loadBtn  = document.getElementById('loadMoreBtn');

  document.getElementById('clearBtn').style.display = rawQuery ? 'block' : 'none';

  // Pool berdasarkan filter kategori
  const pool = activeFilter === 'all'
    ? DB
    : DB.filter(x => x.category === activeFilter);

  // Jika query kosong → tampilkan semua
  if (!rawQuery) {
    currentResults = pool;
    displayedCount = PAGE_SIZE;
    info.innerHTML = `Browsing <span>${pool.length}</span> questions${activeFilter !== 'all' ? ' · filtered' : ''} — type to search`;
    list.innerHTML = pool.slice(0, PAGE_SIZE).map((item, i) => renderCard(item, [], '', i)).join('');
    loadBtn.style.display = pool.length > PAGE_SIZE ? 'block' : 'none';
    return;
  }

  // Filter & sort: hanya tampilkan yang semua kata cocok
  const scored = pool
    .map(item => ({ item, score: matchItem(item, words, rawQuery) }))
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score);

  currentResults = scored.map(x => x.item);
  displayedCount = PAGE_SIZE;

  if (currentResults.length === 0) {
    info.innerHTML = `No results for "<span>${escHtml(rawQuery)}</span>"`;
    list.innerHTML = `
      <div class="state-box">
        <div class="state-icon">📜</div>
        <div class="state-title">No questions found</div>
        <div class="state-sub">Try a different keyword, e.g. "England" instead of "in England".</div>
      </div>`;
    loadBtn.style.display = 'none';
    return;
  }

  info.innerHTML = `Found <span>${currentResults.length}</span> result${currentResults.length !== 1 ? 's' : ''} for "<span>${escHtml(rawQuery)}</span>"`;
  list.innerHTML = currentResults.slice(0, displayedCount).map((item, i) => renderCard(item, words, rawQuery, i)).join('');
  loadBtn.style.display = currentResults.length > displayedCount ? 'block' : 'none';
}

// ─────────────────────────────────────────────────────────────
//  EVENT LISTENERS
// ─────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(renderResults, 150);
});

document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('searchInput').value = '';
  renderResults();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.cat;
    renderResults();
  });
});

document.getElementById('loadMoreBtn').addEventListener('click', () => {
  const rawQuery = document.getElementById('searchInput').value.trim();
  const words    = getWords(rawQuery);
  displayedCount += PAGE_SIZE;
  document.getElementById('resultsList').innerHTML =
    currentResults.slice(0, displayedCount).map((item, i) => renderCard(item, words, rawQuery, i)).join('');
  document.getElementById('loadMoreBtn').style.display =
    currentResults.length > displayedCount ? 'block' : 'none';
});

// ─────────────────────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────────────────────
loadDB();
</script>

</body>
</html>
